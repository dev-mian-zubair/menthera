name: EAS Production Build & Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build for
        required: true
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  build:
    name: EAS Production Build & Submit
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_OWNER: ${{ vars.EXPO_OWNER }}
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and submit
        run: eas build --profile production --auto-submit --non-interactive ${{ inputs.platform != 'all' && format('--platform {0}', inputs.platform) || '' }}
